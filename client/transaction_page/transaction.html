<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giao dịch</title>
    <link rel="icon" href="../images/spendwise_favicon1.png">
    <link rel="stylesheet" href="transaction.css">
    <link rel="stylesheet" href="../navbar/loader.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div id="page-loader" class="page-loader">
        <div class="spinner"></div>
    </div>
    <div id="sidebar"></div>

    <!-- Thẻ "Thêm thành công giao dịch"-->
    <div id="success-toast">
        <div>
            <i class="fa-regular fa-circle-check" style="font-size: 50px; color: #1D8B6E;"></i>
            <span id="toast-message">Thêm giao dịch thành công!</span>
        </div>
    </div>
     
    <!--Biểu mẫu xác nhận xóa-->
    <div id="confirm-deletion">
        <div>
            <p>Bạn xác nhận muốn xóa?</p>
            <div class="delete-option">
                <button>Không</button>
                <button>Xóa</button>
            </div>
        </div>
    </div>

    <div class="transaction">
        <div class="transaction-header">
            <h1 class="title">GIAO DỊCH</h1>
            <button type="button" id="addBtn" class="add-btn" onclick="openForm('add')">
                <svg width="20" height="20" viewBox="0 0 24 24">
                    <path d="M12 5v14M5 12h14" stroke="white" stroke-width="7" stroke-linecap="round" />
                </svg>
                <span class="add-text">Thêm giao dịch</span>
            </button>
            <div id="overlay" class="hidden" onclick="closeForm()">
                <div id="formPopup" class="add_transaction" onclick="event.stopPropagation()">
                    <form id="transactionForm">
                        <h1 class="add-title">Thêm giao dịch mới</h1>
                        <fieldset class="type-opt">
                            <input id="thu" type="radio" name="type" value="thu" checked>
                            <label for="thu">Thu nhập</label>

                            <input id="chi" type="radio" name="type" value="chi">
                            <label for="chi">Chi tiêu</label>
                        </fieldset>
                        <div class="money">
                            <div class="input-group">
                                <label for="amount">Số tiền (VNĐ)</label>
                                <input id="amount" type="number" name="amount" placeholder="Nhập số tiền" required>
                            </div>
                        </div>
                        <div class="choose">
                            <div class="date">
                                <div class="input-group">
                                    <label for="input-date">Ngày giao dịch</label>
                                    <input id="input-date" type="date" name="date" required>
                                </div>
                            </div>
                            <div class="category">
                                <div class="input-group">
                                    <label for="opt-category">Danh mục</label>
                                    <select id="opt-category" name="category" required>
                                        <option value="">-- Chọn loại --</option>
                                        <option value="">-- Chọn loại --</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="note">
                            <div class="input-group">
                                <label for="input-note">Ghi chú</label>
                                <input id="input-note" type="text" name="note" placeholder="Nhập thông tin giao dịch">
                            </div>
                        </div>
                        <div class="bttn">
                            <button type="button" id="cancelBtn">Hủy</button>
                            <button type="submit">Lưu</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        <div class="tool" style="display: flex; gap: 15px; align-items: center;">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input id="search-note" class="search-input" type="text" placeholder="Tìm kiếm giao dịch">
            </div>
            <input id="search-date" type="date" title="Ngày giao dịch"
                style="padding: 0 15px; height: 45px; border-radius: 15px; border: 1px solid #151565; outline: none; background-color: white; font-size: 16px; font-family: inherit; color: #151565; cursor: pointer;">
            <select id="search-category" title="Phân loại chi tiêu"
                style="padding: 0 15px; height: 45px; border-radius: 15px; border: 1px solid #151565; outline: none; background-color: white; font-size: 16px; font-family: inherit; color: #151565; cursor: pointer;">
                <option value="">Tất cả danh mục</option>
                <optgroup label="Thu nhập">
                    <option value="salary">Lương</option>
                    <option value="bonus">Thưởng</option>
                    <option value="interest">Lãi suất</option>
                    <option value="sale">Bán đồ</option>
                    <option value="other_thu">Khác</option>
                </optgroup>
                <optgroup label="Chi tiêu">
                    <option value="food">Ăn uống</option>
                    <option value="movement">Di chuyển</option>
                    <option value="house">Nhà cửa</option>
                    <option value="shopping">Mua sắm</option>
                    <option value="entertainment">Giải trí</option>
                    <option value="health">Sức khỏe</option>
                    <option value="education">Giáo dục</option>
                    <option value="gift">Quà tặng</option>
                    <option value="other_chi">Khác</option>
                </optgroup>
            </select>
            <select id="sort-opt" title="Sắp xếp">
                <option value="date">Gần đây nhất</option>
                <option value="amount">Số tiền lớn nhất</option>
            </select>
        </div>
        <div class="history-list" id="history-list">
            Chưa có giao dịch nào
        </div>

    </div>
    </div>

    <script src="./transaction.js"></script>
    <script src="../navbar/loadSidebar.js"></script>
</body>

</html>
