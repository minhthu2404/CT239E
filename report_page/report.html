<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo</title>
    <link rel="icon" href="/images/spendwise_favicon1.png">
    <link rel="stylesheet" href="/report_page/report.css">
    <link rel="stylesheet" href="/navbar/sidebar.css">
    <link rel="stylesheet" href="/navbar/loader.css">
</head>

<body>
    <div id="page-loader" class="page-loader">
        <div class="spinner"></div>
    </div>
    <div id="sidebar"></div>
    <div class="report">
        <div class="title">
            <h1>Báo cáo chi tiết</h1>
            <select id="opt">
                <option value="1">Tháng 1</option>
                <option value="2">Tháng 2</option>
                <option value="3">Tháng 3</option>
                <option value="4">Tháng 4</option>
                <option value="5">Tháng 5</option>
                <option value="6">Tháng 6</option>
                <option value="7">Tháng 7</option>
                <option value="8">Tháng 8</option>
                <option value="9">Tháng 9</option>
                <option value="10">Tháng 10</option>
                <option value="11">Tháng 11</option>
                <option value="12">Tháng 12</option>
            </select>
        </div>
        <div class="content">
            <div class="card">
                <div id="card-1">
                    <p class="title-card">
                        <span class="icon wallet-svg">
                            <i class="fa-duotone fa-solid fa-wallet"></i>
                        </span>
                        Số dư tháng
                    </p>
                    <p class="value-card">
                        <span id="cash">1.200.000</span>đ
                    </p>
                </div>
                <div id="card-2">
                    <p class="title-card">
                        <span class="icon arrowup-svg">
                            <i class="fa-sharp fa-solid fa-arrow-trend-up"></i>
                        </span>
                        Tổng thu nhập
                    </p>
                    <p class="value-card">
                        <span id="cash">1.200.000</span>đ
                    </p>
                </div>
                <div id="card-3">
                    <p class="title-card">
                        <span class="icon arrowdown-svg">
                            <i class="fa-sharp fa-solid fa-arrow-trend-down"></i>
                        </span>
                        Tổng chi tiêu
                    </p>
                    <p class="value-card">
                        <span id="cash">1.000</span>đ
                    </p>
                </div>
                <div id="card-4">
                    <p class="title-card">
                        <span class="icon trophy-svg">
                            <i class="fa fa-trophy" aria-hidden="true"></i>
                        </span>
                        Danh mục lớn nhất
                    </p>
                    <p class="value-card">
                        <span id="cash">Ăn uống</span>
                    </p>
                </div>
            </div>

            <div class="chart">
                <div id="doughnut-chart-container">
                    <canvas id="doughnut-chart"></canvas>
                </div>
                <div id="line-chart-container">
                    <canvas id="line-chart"></canvas>
                </div>
            </div>
            <div class="detail-transaction">
                <p>Chi tiết giao dịch</p>
                <div class="detail-content"></div>
            </div>
        </div>
    </div>
    <script src="../navbar/loadSidebar.js"></script>
</body>

</html>
